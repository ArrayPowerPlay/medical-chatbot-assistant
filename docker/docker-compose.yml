version: '3.8'

services:
  # Weaviate: Vector DB + BM25   weaviate:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: weaviate-medrag
    ports:
      # host_port : container_port
      - "8080:8080"   # REST API
      - "50051:50051" # gRPC (another protocol, faster than REST but more complex)
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate

  # Neo4j: Knowledge Graph (PrimeKG)
  neo4j:
    image: neo4j:5.18.0
    container_name: neo4j-medrag
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

volumes:
  weaviate_data:
  neo4j_data:
