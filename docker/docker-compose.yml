version: '3.8'

services:
  # Elasticsearch for BM25
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: es-medrag
    ports:
      - "9200:9200" # REST API of Elastic Search
    environment:
      - node.name=es-node
      - cluster.name=medrag-cluster
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # Neo4j: Knowledge Graph (PrimeKG)
  neo4j:
    image: neo4j:5.18.0
    container_name: neo4j-medrag
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt protocol 
    environment:
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data

volumes:
  es_data:
  neo4j_data:
